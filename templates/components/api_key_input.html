<div id="api-key-section" class="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-4">
    <div class="flex items-start gap-3">
        <span class="text-xl">🔑</span>
        <div class="flex-1">
            <h3 class="text-sm font-semibold text-amber-800">AI 功能需要配置 API Key</h3>
            <p class="text-xs text-amber-600 mt-0.5">可在页面右上角的⚙️设置中随时修改</p>

            <form hx-post="/api/ai/set-key"
                  hx-target="#api-key-status"
                  class="mt-3 space-y-2">
                <div>
                    <label class="text-xs text-amber-700 font-medium">API Key *</label>
                    <input type="password" name="api_key" required
                           class="w-full px-3 py-1.5 border border-amber-300 rounded text-sm focus:ring-2 focus:ring-amber-200 outline-none"
                           placeholder="sk-...">
                </div>
                <div>
                    <label class="text-xs text-amber-700 font-medium">API Base URL（可选）</label>
                    <input type="text" name="api_base"
                           class="w-full px-3 py-1.5 border border-amber-300 rounded text-sm focus:ring-2 focus:ring-amber-200 outline-none"
                           placeholder="https://api.deepseek.com">
                </div>
                <div class="flex items-center gap-2">
                    <button type="submit"
                            class="px-3 py-1.5 bg-amber-500 text-white rounded text-xs hover:bg-amber-600 transition-colors">
                        保存并验证
                    </button>
                    <span class="text-xs text-amber-500">Key 仅保存在本地 .apikey 文件中</span>
                </div>
                <div id="api-key-status"></div>
            </form>
        </div>
    </div>
</div>
