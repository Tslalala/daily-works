{% extends "layout.html" %}
{% block title %}每日日志 - {{ log_date }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-2 mb-6">
        <a href="/daily-log" style="color: var(--text-muted)" class="hover:opacity-70">&larr; 日志列表</a>
        <h1 class="text-xl font-bold" style="color: var(--text-primary)">{{ log_date.strftime('%Y-%m-%d') }} 日志</h1>
    </div>

    <div class="glass-card p-6">
        <form hx-post="/api/daily-log/{{ log_date }}" hx-target="body" hx-swap="beforeend"
              hx-on::after-request="if(event.detail.successful) window.location.href='/daily-log'"
              class="space-y-4">

            <div>
                <label class="block text-sm font-medium mb-1" style="color: var(--text-primary)">今天的心情</label>
                <div class="flex gap-3" x-data="{ mood: '{{ log.mood if log and log.mood else "neutral" }}' }">
                    {% for val, emoji in [("great", "😄"), ("good", "🙂"), ("neutral", "😐"), ("bad", "😔"), ("awful", "😢")] %}
                        <label class="flex flex-col items-center cursor-pointer p-2 rounded-lg transition-colors"
                               :class="mood === '{{ val }}' ? 'accent-subtle' : 'hover:opacity-80'"
                               style="border-radius: 12px;">
                            <input type="radio" name="mood" value="{{ val }}"
                                   x-model="mood" class="sr-only"
                                   {% if log and log.mood == val %}checked{% endif %}>
                            <span class="text-2xl">{{ emoji }}</span>
                            <span class="text-xs mt-1" style="color: var(--text-muted)">
                                {% if val == "great" %}很棒{% elif val == "good" %}不错{% elif val == "neutral" %}一般{% elif val == "bad" %}不好{% else %}糟透{% endif %}
                            </span>
                        </label>
                    {% endfor %}
                </div>
            </div>

            <div x-data="{ generating: false, async gen() {
                this.generating = true;
                try {
                    const r = await fetch('/api/ai/generate-daily-log', { method: 'POST', body: new URLSearchParams({ date: '{{ log_date }}', content: $refs.content.value }) });
                    const text = await r.text();
                    $refs.content.value = text;
                } finally {
                    this.generating = false;
                }
            } }">
                <div class="flex items-center justify-between mb-1">
                    <label class="block text-sm font-medium" style="color: var(--text-primary)">今天想说什么？</label>
                    <button type="button" @click="gen()" :disabled="generating"
                            class="text-xs px-3 py-1.5 rounded-lg transition-colors"
                            :class="generating ? 'opacity-50 cursor-wait' : 'accent-subtle accent-text'">
                        <span x-show="!generating">🤖 AI 总结今日动态</span>
                        <span x-show="generating">⏳ 生成中...</span>
                    </button>
                </div>
                <textarea x-ref="content" name="content" rows="6"
                          class="w-full px-3 py-2 border rounded-lg text-sm outline-none resize-none"
                          style="border-color: #e2e8f0; background: rgba(255,255,255,0.5);"
                          placeholder="记录今天发生的事情、感受、想法...">{{ log.content if log and log.content else '' }}</textarea>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit" class="btn-primary">
                    保存日志
                </button>
                <a href="/daily-log"
                   class="px-4 py-2 rounded-lg text-sm transition-colors"
                   style="background: rgba(0,0,0,0.04); color: var(--text-secondary);">
                    取消
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
