<div id="habit-history">
    {# Focus detail panel #}
    <div class="glass-card p-4 mb-4">
        <div class="flex items-center justify-between mb-3">
            <h2 class="text-sm font-medium" style="color: var(--text-primary)">
                📅 {{ focus_date }}
            </h2>
            <button hx-post="/api/habits/{{ habit.id }}/toggle-date"
                    hx-target="#habit-history"
                    hx-swap="outerHTML"
                    hx-vals='{"date": "{{ focus_date }}"}'
                    class="px-3 py-1.5 text-xs rounded-lg font-medium transition-colors"
                    style="{% if focus_checked %}background: #fef2f2; color: #dc2626;{% else %}background: var(--primary-bg); color: var(--primary);{% endif %}">
                {% if focus_checked %}↩️ 取消打卡{% else %}✅ 补卡{% endif %}
            </button>
        </div>

        {# Editable note #}
        <form hx-post="/api/habits/{{ habit.id }}/save-note"
              hx-target="#habit-history"
              hx-swap="outerHTML">
            <input type="hidden" name="date" value="{{ focus_date }}">
            <div class="flex items-start gap-2">
                <textarea name="note" rows="2" maxlength="500"
                          class="flex-1 px-3 py-2 rounded-lg text-sm outline-none resize-none"
                          style="border: 1px solid var(--glass-border); background: rgba(255,255,255,0.5); color: var(--text-primary);"
                          placeholder="添加打卡备注...">{{ focus_note }}</textarea>
                <button type="submit"
                        class="px-3 py-2 text-white rounded-lg text-xs transition-colors whitespace-nowrap"
                        style="background: var(--primary);">
                    保存备注
                </button>
            </div>
        </form>
    </div>

    {# Calendar grid #}
    <div class="grid grid-cols-7 gap-1.5">
        {% for day in calendar_days %}
            <div class="flex flex-col items-center">
                {% if loop.index <= 7 %}
                    <span class="text-xs mb-1" style="color: var(--text-muted)">{{ day.day_name }}</span>
                {% endif %}
                <button hx-get="/api/habits/{{ habit.id }}/history?focus={{ day.date_iso }}"
                        hx-target="#habit-history"
                        hx-swap="outerHTML"
                        class="w-8 h-8 rounded-lg flex items-center justify-center text-xs font-medium relative group transition-colors"
                        style="{% if focus_date and day.date_iso == focus_date %}outline: 2px solid var(--primary); outline-offset: 1px;{% endif %}
                               {% if day.is_today and day.date_iso != focus_date %}outline: 1px solid var(--primary-light); outline-offset: 1px;{% endif %}
                               {% if day.checked %}background: var(--primary); color: white;{% else %}background: rgba(0,0,0,0.04); color: var(--text-secondary);{% endif %}">
                    {{ day.day_num }}
                    {% if day.note %}
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-1 hidden group-hover:block z-10 pointer-events-none">
                        <div class="bg-gray-800 text-white text-xs rounded-lg px-2 py-1 shadow-lg max-w-[180px] whitespace-nowrap">
                            {{ day.note }}
                        </div>
                    </div>
                    {% endif %}
                </button>
            </div>
        {% endfor %}
    </div>
    <div class="flex items-center gap-2 mt-3 text-xs" style="color: var(--text-muted);">
        <span>较少</span>
        <div class="w-3 h-3 rounded-sm" style="background: rgba(0,0,0,0.04);"></div>
        <div class="w-3 h-3 rounded-sm" style="background: var(--primary);"></div>
        <span>较多</span>
        <span class="ml-auto">{{ checked_count }} / {{ calendar_days|length }} 天</span>
    </div>
</div>
