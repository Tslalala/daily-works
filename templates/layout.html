<!DOCTYPE html>
<html lang="zh-CN" x-data="themeManager()" x-init="init()" :data-theme="theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Daily Planner{% endblock %}</title>
    <script>
        // Synchronously set theme BEFORE any rendering to prevent color flash
        (function() {
            var theme = localStorage.getItem('theme');
            if (theme) document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        /* ===== Glassmorphism Base ===== */
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #a5b4fc;
            --primary-bg: #eef2ff;
            --primary-subtle: rgba(99,102,241,0.08);
            --glass-bg: rgba(255,255,255,0.65);
            --glass-border: rgba(255,255,255,0.7);
            --glass-shadow: 0 8px 32px rgba(0,0,0,0.04);
            --glass-hover-shadow: 0 8px 40px rgba(0,0,0,0.08);
            --body-bg: #f0eeff;
            --body-gradient: linear-gradient(135deg, #f0eeff 0%, #f8f7ff 50%, #f0f2ff 100%);
            --nav-bg: rgba(255,255,255,0.72);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
        }

        /* ===== Color Themes ===== */
        [data-theme="blue"] {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #93c5fd;
            --primary-bg: #eff6ff;
            --primary-subtle: rgba(59,130,246,0.08);
            --body-bg: #eef4ff;
            --body-gradient: linear-gradient(135deg, #eef4ff 0%, #f5f8ff 50%, #eef2ff 100%);
        }
        [data-theme="teal"] {
            --primary: #14b8a6;
            --primary-dark: #0d9488;
            --primary-light: #5eead4;
            --primary-bg: #f0fdfa;
            --primary-subtle: rgba(20,185,166,0.08);
            --body-bg: #ecfdf8;
            --body-gradient: linear-gradient(135deg, #ecfdf8 0%, #f4fdfb 50%, #ecfdf5 100%);
        }
        [data-theme="green"] {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #6ee7b7;
            --primary-bg: #ecfdf5;
            --primary-subtle: rgba(16,185,129,0.08);
            --body-bg: #ecfdf3;
            --body-gradient: linear-gradient(135deg, #ecfdf3 0%, #f4fdf7 50%, #ecfdef 100%);
        }
        [data-theme="orange"] {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --primary-light: #fdba74;
            --primary-bg: #fff7ed;
            --primary-subtle: rgba(249,115,22,0.08);
            --body-bg: #fff7ed;
            --body-gradient: linear-gradient(135deg, #fff7ed 0%, #fffaf0 50%, #fff5eb 100%);
        }
        [data-theme="rose"] {
            --primary: #f43f5e;
            --primary-dark: #e11d48;
            --primary-light: #fda4af;
            --primary-bg: #fff1f2;
            --primary-subtle: rgba(244,63,94,0.08);
            --body-bg: #fff0f2;
            --body-gradient: linear-gradient(135deg, #fff0f2 0%, #fff5f6 50%, #fff0f4 100%);
        }
        [data-theme="purple"] {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #c4b5fd;
            --primary-bg: #f5f3ff;
            --primary-subtle: rgba(139,92,246,0.08);
            --body-bg: #f3f0ff;
            --body-gradient: linear-gradient(135deg, #f3f0ff 0%, #f8f5ff 50%, #f3f0fe 100%);
        }
        [data-theme="slate"] {
            --primary: #64748b;
            --primary-dark: #475569;
            --primary-light: #94a3b8;
            --primary-bg: #f1f5f9;
            --primary-subtle: rgba(100,116,139,0.08);
            --body-bg: #f4f6f8;
            --body-gradient: linear-gradient(135deg, #f4f6f8 0%, #f8f9fa 50%, #f4f6f9 100%);
        }

        /* ===== Glass Card ===== */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }
        .glass-card:hover {
            box-shadow: var(--glass-hover-shadow);
        }
        .glass-card-static {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
        }

        /* ===== Button Primary ===== */
        .btn-primary {
            background: var(--primary);
            color: white;
            border-radius: 10px;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            transition: opacity 0.2s, transform 0.1s;
            border: none;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            line-height: 1.4;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:active { transform: scale(0.97); opacity: 0.85; }
        .btn-primary:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
        .btn-primary:focus { outline: none; }
        .btn-ghost {
            background: var(--primary-subtle);
            color: var(--primary);
            border-radius: 10px;
            padding: 0.375rem 0.75rem;
            font-size: 0.875rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-ghost:hover {
            background: var(--primary-bg);
        }

        /* ===== Accent helpers ===== */
        .accent-text { color: var(--primary); }
        .accent-bg { background: var(--primary); }
        .accent-bg-light { background: var(--primary-bg); }
        .accent-subtle { background: var(--primary-subtle); }
        .accent-ring:focus { ring-color: var(--primary-light); }
        [x-cloak] { display: none !important; }

        /* ===== Body & Nav ===== */
        body {
            background: var(--body-gradient);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        nav {
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.8);
            position: sticky;
            top: 0;
            z-index: 40;
        }
        .nav-link {
            color: var(--text-secondary);
            transition: color 0.15s, background 0.15s;
            border-radius: 8px;
        }
        .nav-link:hover {
            color: var(--text-primary);
            background: var(--primary-subtle);
        }
        .nav-link-active {
            color: var(--primary);
            background: var(--primary-subtle);
            font-weight: 600;
        }

        /* ===== App title ===== */
        .app-title { color: var(--primary); }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 3px; }

        /* ===== HTMX loading ===== */
        .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator { opacity: 1; }

        /* ===== Transitions ===== */
        .fade-out { transition: opacity 0.5s; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body>
    <nav>
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center space-x-1">
                    <a href="/" class="text-xl font-bold app-title">📋 Planner</a>
                    <div class="ml-6 flex space-x-1">
                        <a href="/"
                           class="nav-link px-3 py-2 text-sm font-medium transition-colors
                                  {% if request.url.path == '/' %}nav-link-active{% endif %}">
                            仪表盘
                        </a>
                        <a href="/targets"
                           class="nav-link px-3 py-2 text-sm font-medium transition-colors
                                  {% if request.url.path.startswith('/targets') %}nav-link-active{% endif %}">
                            目标
                        </a>
                        <a href="/habits"
                           class="nav-link px-3 py-2 text-sm font-medium transition-colors
                                  {% if request.url.path.startswith('/habits') %}nav-link-active{% endif %}">
                            习惯打卡
                        </a>
                        <a href="/daily-log"
                           class="nav-link px-3 py-2 text-sm font-medium transition-colors
                                  {% if request.url.path.startswith('/daily-log') %}nav-link-active{% endif %}">
                            每日日志
                        </a>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-sm" style="color: var(--text-muted)">{{ now.strftime('%Y-%m-%d %A') if now else '' }}</span>
                    <button @click="settingsOpen = true"
                            class="text-lg leading-none transition-colors"
                            style="color: var(--text-muted)"
                            title="设置">
                        ⚙️
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Settings Modal -->
    <div x-show="settingsOpen" x-cloak
         class="fixed inset-0 z-50 flex items-center justify-center"
         @keydown.escape.window="settingsOpen = false">
        <div @click="settingsOpen = false" class="absolute inset-0" style="background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);"></div>
        <div @click.stop="" class="relative glass-card-static p-6 w-full max-w-md mx-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold" style="color: var(--text-primary)">⚙️ 设置</h2>
                <button @click="settingsOpen = false"
                        class="text-lg leading-none transition-colors"
                        style="color: var(--text-muted)">&times;</button>
            </div>

            <div class="space-y-4">
                <!-- API Key Section -->
                <div class="glass-card-static p-4">
                    <h3 class="text-sm font-semibold mb-3" style="color: var(--text-primary)">🔑 AI API 配置</h3>
                    <p class="text-xs mb-3" style="color: var(--text-muted)">配置后可使用 AI 智能建议功能。支持 DeepSeek、Qwen 等兼容 OpenAI API 的服务。</p>

                    <form hx-post="/api/ai/set-key"
                          hx-target="#settings-status"
                          class="space-y-3">
                        <div>
                            <label class="text-xs font-medium" style="color: var(--text-secondary)">API Key</label>
                            <input type="password" name="api_key" required
                                   class="w-full px-3 py-2 border rounded-lg text-sm outline-none transition-shadow"
                                   style="border-color: #e2e8f0; background: rgba(255,255,255,0.5);"
                                   placeholder="sk-...">
                        </div>
                        <div>
                            <label class="text-xs font-medium" style="color: var(--text-secondary)">API Base URL（可选）</label>
                            <input type="text" name="api_base"
                                   class="w-full px-3 py-2 border rounded-lg text-sm outline-none transition-shadow"
                                   style="border-color: #e2e8f0; background: rgba(255,255,255,0.5);"
                                   placeholder="https://api.deepseek.com">
                            <p class="text-xs mt-1" style="color: var(--text-muted)">默认: DeepSeek。Qwen 填 https://dashscope.aliyuncs.com/compatible-mode/v1</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button type="submit" class="btn-primary text-xs px-3 py-1.5">
                                保存并验证
                            </button>
                            <span id="settings-loading" class="htmx-indicator text-xs" style="color: var(--text-muted)">
                                <span class="inline-block animate-pulse">验证中...</span>
                            </span>
                            <span class="text-xs" style="color: var(--text-muted)">Key 仅保存在本地文件</span>
                        </div>
                        <div id="settings-status"></div>
                    </form>
                </div>

                <!-- Color Theme Section -->
                <div class="glass-card-static p-4">
                    <h3 class="text-sm font-semibold mb-3" style="color: var(--text-primary)">🎨 界面主题</h3>
                    <div class="flex items-center gap-3">
                        <template x-for="t in themes" :key="t.id">
                            <button @click="setTheme(t.id)"
                                    class="w-8 h-8 rounded-full flex items-center justify-center transition-transform hover:scale-110"
                                    :style="{ background: t.color }"
                                    :title="t.label"
                                    :class="theme === t.id ? 'ring-2 ring-offset-2' : ''"
                                    :style="theme === t.id ? `background: ${t.color}; ring-color: ${t.color}` : `background: ${t.color}`">
                                <span x-show="theme === t.id" class="text-white text-xs font-bold">✓</span>
                            </button>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-20 right-4 z-50 flex flex-col space-y-2" x-data="{ toasts: [] }">
        <template x-for="(toast, i) in toasts" :key="i">
            <div x-show="toast.show" x-transition.duration.300ms
                 class="px-4 py-3 rounded-xl shadow-lg text-white text-sm max-w-sm backdrop-blur-sm"
                 :style="{ background: toast.type === 'success' ? 'var(--primary)' : toast.type === 'error' ? '#ef4444' : '#3b82f6' }"
                 x-init="setTimeout(() => { toast.show = false; setTimeout(() => toasts.splice(i, 1), 300); }, 3000)"
                 x-text="toast.message">
            </div>
        </template>
    </div>

    <script>
        // Theme manager
        function themeManager() {
            return {
                theme: localStorage.getItem('theme') || 'indigo',
                settingsOpen: false,
                themes: [
                    { id: 'indigo', label: '靛蓝', color: '#6366f1' },
                    { id: 'blue', label: '天空蓝', color: '#3b82f6' },
                    { id: 'teal', label: '青绿', color: '#14b8a6' },
                    { id: 'green', label: '翡翠绿', color: '#10b981' },
                    { id: 'orange', label: '活力橙', color: '#f97316' },
                    { id: 'rose', label: '玫瑰粉', color: '#f43f5e' },
                    { id: 'purple', label: '紫罗兰', color: '#8b5cf6' },
                    { id: 'slate', label: '石墨灰', color: '#64748b' },
                ],
                init() {
                    document.documentElement.dataset.theme = this.theme;
                },
                setTheme(id) {
                    this.theme = id;
                    localStorage.setItem('theme', id);
                    document.documentElement.dataset.theme = id;
                }
            };
        }

        // Toast listener
        document.body.addEventListener('show-toast', function(evt) {
            const detail = typeof evt.detail === 'string' ? { message: evt.detail, type: 'success' } : evt.detail;
            const container = document.getElementById('toast-container');
            if (container && container.__x) {
                container.__x.$data.toasts.push({ show: true, message: detail.message, type: detail.type || 'success' });
            }
        });

        // Auto-dismiss flash messages
        document.body.addEventListener('htmx:afterSwap', function() {
            document.querySelectorAll('[data-auto-dismiss]').forEach(function(el) {
                setTimeout(function() { el.remove(); }, 3000);
            });
        });
    </script>
</body>
</html>
